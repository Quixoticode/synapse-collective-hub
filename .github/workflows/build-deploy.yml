name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - test-build
  pull_request:
    branches:
      - main
      - test-build

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build project
        run: bun run build

      - name: Debug - List dist contents
        run: |
          echo "=== Dist Structure ==="
          ls -la dist/ || echo "dist/ not found"
          echo "=== Dist/Client ==="
          ls -la dist/client/ || echo "dist/client/ not found"
          echo "=== Files in dist/client ==="
          find dist/client -type f -name "*.html" -o -name "*.js" -o -name "*.css" | head -20 || echo "No files found"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist/client'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/test-build'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
