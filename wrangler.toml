name = "synapse-collective-hub"
main = "dist/server/server.js"
compatibility_date = "2024-11-06"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"

[observability]
enabled = true

# --- Set these via `bunx wrangler secret put <NAME>` before deploying ---
# (Do not commit real values here — this file is version-controlled.)
# [vars]
# SUPABASE_URL = "..."


# Geheimnisse setzt du via `bunx wrangler secret put <NAME>`:
#   SUPABASE_URL
#   SUPABASE_PUBLISHABLE_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   LOVABLE_API_KEY
#   BREVO_API_KEY
#   CF_EMAIL_WEBHOOK_SECRET
